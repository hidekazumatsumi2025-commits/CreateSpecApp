name: Bug report
description: Something is broken
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Steps, inputs, environment
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots

