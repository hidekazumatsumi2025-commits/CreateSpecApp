name: Feature request
description: Propose a change
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What problem are we solving?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria (draft)
      description: Bullet points or Given/When/Then
  - type: textarea
    id: constraints
    attributes:
      label: Constraints / Risks

